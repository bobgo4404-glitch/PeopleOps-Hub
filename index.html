<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인건비 전략 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg: #f4f6f9;
        --bg2: #eef2f7;
        --panel: #ffffff;
        --panel-muted: #f8fafc;
        --text: #101828;
        --subtext: #667085;
        --line: #d9e0ea;
        --primary: #0b7a75;
        --primary-2: #2563eb;
        --danger: #c62828;
        --warn: #ca8a04;
        --ring: rgba(37, 99, 235, 0.16);
        --sidebar: #ffffff;
        --sidebar-muted: #f5f7fb;
        --nav-active: #e8f4f2;
        --nav-hover: #f1f5f9;
      }
      body.theme-dark {
        --bg: #0b1220;
        --bg2: #111827;
        --panel: #101b2d;
        --panel-muted: #142238;
        --text: #e9efff;
        --subtext: #9eb0cb;
        --line: rgba(84, 112, 154, 0.32);
        --primary: #2dd4bf;
        --primary-2: #38bdf8;
        --danger: #f87171;
        --warn: #fbbf24;
        --ring: rgba(45, 212, 191, 0.24);
        --sidebar: #0f172a;
        --sidebar-muted: #111f35;
        --nav-active: rgba(45, 212, 191, 0.14);
        --nav-hover: rgba(148, 163, 184, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      body.theme-dark {
        background: var(--bg);
      }
      .app-layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 268px minmax(0, 1fr);
      }
      .app-main {
        min-width: 0;
        padding: 24px 28px 42px;
      }
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 18px 14px;
        background: var(--sidebar);
        border-right: 1px solid var(--line);
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
      }
      .brand-title {
        font-size: 0.98rem;
        font-weight: 800;
        line-height: 1.2;
      }
      .brand-subtitle {
        font-size: 0.72rem;
        color: var(--subtext);
        margin-top: 2px;
      }
      .nav-list {
        display: grid;
        gap: 4px;
      }
      .nav-link {
        width: 100%;
        min-height: 40px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        background: transparent;
        color: var(--subtext);
        font-size: 0.9rem;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
      }
      .nav-link i {
        width: 18px;
        text-align: center;
      }
      .nav-link:hover {
        background: var(--nav-hover);
        color: var(--text);
      }
      .nav-link.active {
        color: var(--primary);
        background: var(--nav-active);
        border-color: rgba(11, 122, 117, 0.18);
      }
      .side-summary {
        margin-top: auto;
        background: var(--sidebar-muted);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .side-summary-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.78rem;
        color: var(--subtext);
      }
      .side-summary-row + .side-summary-row {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .side-summary-row b {
        color: var(--text);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 30px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-muted);
        color: var(--subtext);
        font-size: 0.78rem;
        font-weight: 700;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #12b76a;
        box-shadow: 0 0 0 4px rgba(18, 183, 106, 0.12);
      }
      .header-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .section-anchor {
        scroll-margin-top: 24px;
      }
      .view-shell {
        display: grid;
        gap: 16px;
      }
      .page-heading {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      .page-kicker {
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
      }
      .page-title {
        margin-top: 3px;
        font-size: 1.55rem;
        line-height: 1.25;
        font-weight: 900;
      }
      .page-copy {
        margin-top: 6px;
        color: var(--subtext);
        font-size: 0.9rem;
      }
      .content-grid {
        display: grid;
        gap: 16px;
      }
      .content-grid.two {
        grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.8fr);
      }
      .content-grid.equal {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .summary-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .summary-item {
        min-height: 84px;
        padding: 14px;
        border-radius: 8px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }
      .summary-label {
        color: var(--subtext);
        font-size: 0.76rem;
        font-weight: 700;
      }
      .summary-value {
        margin-top: 8px;
        font-size: 1.28rem;
        font-weight: 900;
      }
      .summary-note {
        margin-top: 5px;
        color: var(--subtext);
        font-size: 0.74rem;
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .table-toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1.6fr) repeat(3, minmax(140px, 0.8fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .toolbar-input {
        width: 100%;
        min-height: 40px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel-muted);
        color: var(--text);
        padding: 8px 10px;
        outline: 0;
      }
      .toolbar-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--ring);
      }
      .table-footer {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .pager {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .score-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        font-size: 0.9rem;
      }
      .score-row:last-child {
        border-bottom: 0;
      }
      .risk-list {
        display: grid;
        gap: 10px;
      }
      .risk-item {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 10px;
        padding: 11px 0;
        border-bottom: 1px solid var(--line);
      }
      .risk-item:last-child {
        border-bottom: 0;
      }
      .risk-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--panel-muted);
      }
      .policy-list {
        display: grid;
        gap: 10px;
      }
      .policy-row {
        display: grid;
        grid-template-columns: 140px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 11px 0;
        border-bottom: 1px solid var(--line);
        font-size: 0.9rem;
      }
      .policy-row:last-child {
        border-bottom: 0;
      }
      .badge-soft {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        padding: 4px 9px;
        background: var(--panel-muted);
        color: var(--subtext);
        border: 1px solid var(--line);
        font-size: 0.75rem;
        font-weight: 800;
      }
      .empty-state {
        padding: 36px 12px;
        text-align: center;
        color: var(--subtext);
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
        transition: box-shadow 0.18s ease, border-color 0.18s ease;
      }
      .panel:hover {
        border-color: rgba(37, 99, 235, 0.22);
        box-shadow: 0 4px 14px rgba(16, 24, 40, 0.07);
      }
      .panel-muted {
        background: var(--panel-muted);
        border: 1px solid var(--line);
      }
      .subtext {
        color: var(--subtext);
      }
      .text-main {
        color: var(--text);
      }
      .primary {
        color: var(--primary);
      }
      .btn-primary {
        background: linear-gradient(120deg, var(--primary), var(--primary-2));
        color: #fff;
        border: 0;
        box-shadow: 0 8px 22px rgba(14, 165, 233, 0.28);
        transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
        box-shadow: 0 12px 24px rgba(14, 165, 233, 0.34);
      }
      .btn-secondary {
        background: var(--panel-muted);
        border: 1px solid var(--line);
        color: var(--text);
        transition: all 0.16s ease;
      }
      .btn-secondary:hover {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--ring);
      }
      .btn-danger {
        background: rgba(220, 38, 38, 0.12);
        border: 1px solid rgba(220, 38, 38, 0.35);
        color: #dc2626;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .kpi-card {
        position: relative;
        overflow: hidden;
      }
      .kpi-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--primary-2));
      }
      .form-control {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        outline: 0;
        transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      }
      body.theme-dark .form-control {
        background: rgba(9, 16, 29, 0.65);
      }
      .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--ring);
      }
      .metric-number {
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum" 1, "lnum" 1;
        letter-spacing: 0;
      }
      .metric-lg {
        font-size: clamp(1.2rem, 1.2vw + 0.9rem, 1.85rem);
        line-height: 1.15;
      }
      .metric-md {
        font-size: 1.02rem;
        font-weight: 700;
      }
      .section-title {
        font-size: 1.06rem;
        font-weight: 800;
        letter-spacing: 0;
      }
      .tone-core {
        color: #0f766e;
      }
      .tone-sim {
        color: #0369a1;
      }
      .tone-forecast {
        color: #7c3aed;
      }
      .tone-productivity {
        color: #166534;
      }
      .tone-analytics {
        color: #b45309;
      }
      body.theme-dark .tone-core {
        color: #2dd4bf;
      }
      body.theme-dark .tone-sim {
        color: #38bdf8;
      }
      body.theme-dark .tone-forecast {
        color: #c4b5fd;
      }
      body.theme-dark .tone-productivity {
        color: #86efac;
      }
      body.theme-dark .tone-analytics {
        color: #fbbf24;
      }
      table {
        border-collapse: separate;
        border-spacing: 0;
      }
      th {
        color: var(--subtext);
        font-weight: 700;
        background: rgba(148, 163, 184, 0.08);
      }
      th,
      td {
        padding: 10px 10px;
      }
      tbody tr {
        transition: background 0.16s ease;
      }
      tbody tr:hover {
        background: rgba(148, 163, 184, 0.1);
      }
      .app-header {
        position: sticky;
        top: 16px;
        z-index: 20;
      }
      .rounded-2xl,
      .rounded-xl {
        border-radius: 8px !important;
      }
      .fade-in {
        animation: fadeUp 0.5s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #d1d5db;
        border-top-color: var(--primary);
        border-radius: 999px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media print {
        body {
          background: #fff !important;
          color: #000 !important;
          font-size: 11pt;
        }
        .no-print {
          display: none !important;
        }
        .panel {
          border: 1px solid #cbd5e1 !important;
          box-shadow: none !important;
          background: #fff !important;
        }
        .print-break {
          break-inside: avoid;
          page-break-inside: avoid;
        }
      }
      @media (max-width: 1023px) {
        .app-layout {
          display: block;
        }
        .sidebar {
          height: auto;
          position: sticky;
          top: 0;
          padding: 12px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .sidebar-brand {
          display: none;
        }
        .nav-list {
          display: flex;
          overflow-x: auto;
          gap: 6px;
          padding-bottom: 2px;
        }
        .nav-link {
          flex: 0 0 auto;
          white-space: nowrap;
        }
        .side-summary {
          display: none;
        }
        .app-main {
          padding: 16px;
        }
        .app-header {
          top: 68px;
        }
        .content-grid.two,
        .content-grid.equal,
        .summary-strip,
        .table-toolbar {
          grid-template-columns: 1fr;
        }
        .page-heading,
        .table-footer {
          align-items: flex-start;
          flex-direction: column;
        }
        .policy-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      const formatNumber = (v) => Number(v || 0).toLocaleString("ko-KR");
      const roundToManwon = (v) => Math.round((Number(v) || 0) / 10000) * 10000;
      const formatCurrency = (v) =>
        `₩${Number(v || 0).toLocaleString("ko-KR", { maximumFractionDigits: 0 })}`;
      const formatCurrencyManwon = (v) =>
        `₩${roundToManwon(v).toLocaleString("ko-KR", { maximumFractionDigits: 0 })}`;
      const formatPercent = (v) => `${Number(v || 0).toFixed(2)}%`;
      const formatCurrencyShort = (v) => {
        const n = Number(v || 0);
        const abs = Math.abs(n);
        if (abs >= 100000000) return `₩${(n / 100000000).toFixed(1)}억`;
        if (abs >= 10000) return `₩${(n / 10000).toFixed(1)}만`;
        return formatCurrency(n);
      };

      const safeNumber = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
      };
      const annualFromMonthly = (monthly) => safeNumber(monthly) * 12;
      const parseHrMoney = (v) => {
        if (v === null || v === undefined || v === "") return 0;
        if (typeof v === "number") {
          if (!Number.isFinite(v)) return 0;
          // HR 원천값이 '만원 단위'(예: 5300)로 들어오는 경우를 원 단위로 보정
          if (v > 0 && v < 1000000) return v * 10000;
          return v;
        }
        const raw = String(v).trim();
        if (!raw) return 0;
        const cleaned = raw.replace(/,/g, "").replace(/\s/g, "");
        const numeric = Number(cleaned.replace(/[^\d.-]/g, ""));
        if (!Number.isFinite(numeric)) return 0;
        if (cleaned.includes("억")) return numeric * 100000000;
        if (cleaned.includes("만원") || cleaned.includes("만")) return numeric * 10000;
        if (numeric > 0 && numeric < 1000000) return numeric * 10000;
        return numeric;
      };
      const parseHrMonthlyBase = (row) => {
        const explicitMonthly =
          row.monthlyBaseSalary ??
          row.baseSalaryMonthly ??
          row.monthBaseSalary ??
          row.monthlySalary;
        if (explicitMonthly !== undefined && explicitMonthly !== null && explicitMonthly !== "") {
          return parseHrMoney(explicitMonthly);
        }

        const explicitAnnual =
          row.annualBaseSalary ??
          row.annualSalary ??
          row.yearSalary ??
          row.salary ??
          row.basePay;
        if (explicitAnnual !== undefined && explicitAnnual !== null && explicitAnnual !== "") {
          const annual = parseHrMoney(explicitAnnual);
          return Math.round(annual / 12);
        }

        const fallback = parseHrMoney(row.baseSalary);
        return fallback >= 10000000 ? Math.round(fallback / 12) : Math.round(fallback);
      };

      const FIELD_ALIASES = {
        name: ["이름", "성명", "name"],
        department: ["부서", "조직", "팀", "department", "dept"],
        grade: ["직급", "직위", "grade", "position", "rank"],
        employmentType: ["고용형태", "계약유형", "employmenttype", "employment"],
        wageType: ["급여유형", "급여형태", "임금유형", "임금형태", "wagetype", "paytype"],
        baseSalary: ["월기본급", "월 기본급", "기본급", "월급", "monthlybasesalary", "basesalary", "monthlysalary"],
        hourlyWage: ["시급", "시간급", "hourlywage", "hourlyrate"],
        monthlyHours: ["월소정근로시간", "월 소정근로시간", "월근로시간", "소정근로시간", "monthlyhours"],
        fixedAllowance: ["연간고정수당", "고정수당", "fixedallowance", "allowance"],
        bonus: ["연간상여금", "상여금", "bonus"],
        performancePay: ["연간성과급", "성과급", "performancepay", "incentive"],
        insuranceEmployer: ["연간4대보험사용자부담액", "4대보험사용자부담액", "보험사용자부담액", "insuranceemployer"],
        retirementProvision: ["연간퇴직충당금", "퇴직충당금", "retirementprovision", "retirement"],
      };
      const normalizeCsvHeader = (v) => String(v || "").replace(/^\uFEFF/, "").replace(/[\s_()-]/g, "").toLowerCase();
      const normalizeWageType = (v, hourlyWage = 0) => {
        const text = String(v || "").trim().toLowerCase();
        if (text.includes("시급") || text.includes("hour")) return "시급제";
        if (text.includes("월급") || text.includes("월")) return "월급제";
        return safeNumber(hourlyWage) > 0 ? "시급제" : "월급제";
      };
      const escapeCsvCell = (v) => `"${String(v ?? "").replace(/"/g, '""')}"`;
      const parseCsvRows = (text) => {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;
        const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        for (let i = 0; i < source.length; i++) {
          const ch = source[i];
          const next = source[i + 1];
          if (ch === '"' && inQuotes && next === '"') {
            cell += '"';
            i += 1;
          } else if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            row.push(cell);
            cell = "";
          } else if (ch === "\n" && !inQuotes) {
            row.push(cell);
            if (row.some((x) => String(x).trim() !== "")) rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += ch;
          }
        }
        row.push(cell);
        if (row.some((x) => String(x).trim() !== "")) rows.push(row);
        return rows;
      };
      const parseEmployeeCsv = (text) => {
        const rows = parseCsvRows(text);
        if (rows.length < 2) return { valid: [], invalid: rows.length ? rows.length - 1 : 0 };
        const headers = rows[0].map(normalizeCsvHeader);
        const fieldByIndex = headers.map((header) => {
          const found = Object.entries(FIELD_ALIASES).find(([, aliases]) =>
            aliases.map(normalizeCsvHeader).includes(header)
          );
          return found?.[0] || "";
        });
        const valid = [];
        let invalid = 0;
        rows.slice(1).forEach((cells) => {
          const raw = {};
          cells.forEach((cell, idx) => {
            const field = fieldByIndex[idx];
            if (field) raw[field] = String(cell || "").trim();
          });
          if (!raw.name && !raw.department && !raw.grade && !raw.baseSalary && !raw.hourlyWage) return;
          const hourlyWage = parseHrMoney(raw.hourlyWage);
          const wageType = normalizeWageType(raw.wageType, hourlyWage);
          const payload = {
            name: raw.name || "",
            department: raw.department || "미지정",
            grade: raw.grade || "미지정",
            employmentType: raw.employmentType || "정규직",
            wageType,
            baseSalary: parseHrMoney(raw.baseSalary),
            hourlyWage,
            monthlyHours: safeNumber(raw.monthlyHours) || (wageType === "시급제" ? 209 : 0),
            fixedAllowance: parseHrMoney(raw.fixedAllowance),
            bonus: parseHrMoney(raw.bonus),
            performancePay: parseHrMoney(raw.performancePay),
            insuranceEmployer: parseHrMoney(raw.insuranceEmployer),
            retirementProvision: parseHrMoney(raw.retirementProvision),
          };
          const hasValidBase = payload.wageType === "시급제" ? payload.hourlyWage > 0 : payload.baseSalary > 0;
          if (!payload.name || !hasValidBase) {
            invalid += 1;
            return;
          }
          valid.push(payload);
        });
        return { valid, invalid };
      };

      const calcEmployeeAnnualBase = (emp) => {
        const wageType = normalizeWageType(emp.wageType, emp.hourlyWage);
        if (wageType === "시급제") {
          const monthlyHours = safeNumber(emp.monthlyHours) || 209;
          return safeNumber(emp.hourlyWage) * monthlyHours * 12;
        }
        return annualFromMonthly(emp.baseSalary);
      };

      const calcEmployeeTotal = (emp) => {
        const annualBase = calcEmployeeAnnualBase(emp);
        const wage =
          annualBase +
          safeNumber(emp.fixedAllowance) +
          safeNumber(emp.bonus) +
          safeNumber(emp.performancePay);
        const total = wage + safeNumber(emp.insuranceEmployer) + safeNumber(emp.retirementProvision);
        return Math.max(total, 0);
      };

                  backgroundColor: theme === "dark" ? "rgba(10,18,34,0.92)" : "rgba(255,255,255,0.96)",
                  titleColor: chartPalette.text,
                  bodyColor: chartPalette.text,
                  borderColor: theme === "dark" ? "rgba(56,189,248,0.3)" : "rgba(2,132,199,0.25)",
                  borderWidth: 1,
                  padding: 12,
                  cornerRadius: 10,
                  callbacks: {
                    label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.parsed.y)}`,
                    footer: (items) => {
                      const picked = items[0];
                      if (!picked) return "";
                      const base = totalLaborCost;
                      const current = picked.parsed.y;
                      const delta = current - base;
                      if (picked.dataIndex === 0) return "기준값";
                      return `현재 대비 변화: ${formatCurrency(delta)} (${formatPercent(
                        base ? (delta / base) * 100 : 0
                      )})`;
                    },
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  grid: { color: chartPalette.grid },
                  ticks: { color: chartPalette.axis, callback: (v) => formatCurrencyShort(v) },
                },
                x: { grid: { display: false }, ticks: { color: chartPalette.axis } },
              },
            },
          });
        }, [totalLaborCost, scenarioResult.total, chartPalette, theme, activeSection]);

        useEffect(() => {
          if (!window.Chart || !forecastChartRef.current) return;
          if (forecastChart.current) forecastChart.current.destroy();
          forecastChart.current = new Chart(forecastChartRef.current, {
            type: "line",
            data: {
              labels: forecastRows.map((r) => r.yearLabel),
              datasets: [
                {
                  label: "3년 인건비 추이",
                  data: forecastRows.map((r) => r.yearlyCost),
                  borderColor: chartPalette.lineA,
                  backgroundColor: chartPalette.lineAFill,
                  tension: 0.35,
                  pointRadius: 3,
                  pointHoverRadius: 5,
                  fill: true,
                },
                {
                  label: "인건비율(%)",
                  data: forecastRows.map((r) => r.laborRatio),
                  borderColor: chartPalette.lineB,
                  backgroundColor: chartPalette.lineBFill,
                  tension: 0.35,
                  pointRadius: 3,
                  pointHoverRadius: 5,
                  yAxisID: "y1",
                },
              ],
            },
            options: {
              interaction: { mode: "index", intersect: false },
              plugins: {
                legend: { labels: { color: chartPalette.text, font: { family: "Noto Sans KR", weight: "700" } } },
                tooltip: {
                  backgroundColor: theme === "dark" ? "rgba(10,18,34,0.92)" : "rgba(255,255,255,0.96)",
                  titleColor: chartPalette.text,
                  bodyColor: chartPalette.text,
                  footerColor: chartPalette.axis,
                  borderColor: theme === "dark" ? "rgba(56,189,248,0.3)" : "rgba(2,132,199,0.25)",
                  borderWidth: 1,
                  padding: 12,
                  cornerRadius: 10,
                  callbacks: {
                    title: (items) => `${items[0]?.label || ""} 전망`,
                    label: (ctx) => {
                      if (ctx.datasetIndex === 0) return `인건비: ${formatCurrency(ctx.parsed.y)} (${formatCurrencyShort(ctx.parsed.y)})`;
                      return `인건비율: ${formatPercent(ctx.parsed.y)}`;
                    },
                    footer: (items) => {
                      if (!items.length) return "";
                      const first = items.find((i) => i.datasetIndex === 0) || items[0];
                      const idx = first.dataIndex;
                      if (idx <= 0) return "전년 대비: 기준 연도";
                      const prev = forecastRows[idx - 1]?.yearlyCost || 0;
                      const curr = forecastRows[idx]?.yearlyCost || 0;
                      const delta = curr - prev;
                      const ratio = prev ? (delta / prev) * 100 : 0;
                      const sign = delta >= 0 ? "+" : "";
                      return `전년 대비: ${sign}${formatCurrency(delta)} (${sign}${formatPercent(ratio)})`;
                    },
                  },
                },
              },
              scales: {
                x: { ticks: { color: chartPalette.axis }, grid: { display: false } },
                y: {
                  beginAtZero: true,
                  ticks: { color: chartPalette.axis, callback: (v) => formatCurrencyShort(v) },
                  grid: { color: chartPalette.grid },
                },
                y1: {
                  position: "right",
                  beginAtZero: true,
                  ticks: { color: chartPalette.axis, callback: (v) => `${Number(v).toFixed(1)}%` },
                  grid: { drawOnChartArea: false },
                },
              },
            },
          });
        }, [forecastRows, chartPalette, theme, activeSection]);

        const saveDoc = async (id, data, successMessage) => {
          try {
            const { fns, db } = services;
            await fns.setDoc(fns.doc(db, SHARED_COLLECTION, id), { ...data, updatedAt: fns.serverTimestamp() }, { merge: true });
            if (successMessage) setToast({ type: "success", message: successMessage });
          } catch (error) {
            console.error(error);
            setToast({ type: "error", message: "저장 실패: 권한/네트워크 상태를 확인하세요." });
          }
        };

        const addLog = async (action, detail) => {
          try {
            const { fns, db } = services;
            await fns.addDoc(fns.collection(db, SHARED_COLLECTION), {
              type: "log",
              action,
              detail,
              actor: uid || "anonymous",
              createdAt: fns.serverTimestamp(),
            });
          } catch (error) {
            console.warn("로그 저장 실패:", error);
          }
        };

        const upsertEmployee = async (payload, targetId) => {
          const id = targetId || `emp_${crypto.randomUUID()}`;
          await saveDoc(
            id,
            {
              type: "employee",
              ...payload,
            },
            targetId ? "직원 정보가 수정되었습니다." : "직원 정보가 추가되었습니다."
          );
          await addLog(targetId ? "employee_update" : "employee_create", `${payload.name}/${payload.department}`);
          setEmployeeModal({ open: false, mode: "create", target: null });
        };

        const downloadEmployeeTemplate = () => {
          const rows = [EMPLOYEE_TEMPLATE_HEADERS, EMPLOYEE_TEMPLATE_SAMPLE, EMPLOYEE_TEMPLATE_HOURLY_SAMPLE];
          const csv = `\uFEFF${rows.map((row) => row.map(escapeCsvCell).join(",")).join("\r\n")}`;
          const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "인건비_직원업로드_양식.csv";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        };

        const uploadEmployeeTemplate = async (event) => {
          const file = event.target.files?.[0];
          if (!file) return;
          try {
            const buffer = await file.arrayBuffer();
            let text = new TextDecoder("utf-8").decode(buffer);
            if (text.includes("�")) {
              try {
                text = new TextDecoder("euc-kr").decode(buffer);
              } catch (decodeError) {
                console.warn("CSV 인코딩 보정 실패:", decodeError);
              }
            }
            const { valid, invalid } = parseEmployeeCsv(text);
            if (!valid.length) {
              setToast({ type: "error", message: "업로드 가능한 직원 데이터가 없습니다. 이름과 월기본급 또는 시급은 필수입니다." });
              return;
            }
            const { fns, db } = services;
            for (let i = 0; i < valid.length; i += 50) {
              const chunk = valid.slice(i, i + 50);
              await Promise.all(
                chunk.map((payload) =>
                  fns.setDoc(
                    fns.doc(db, SHARED_COLLECTION, `emp_${crypto.randomUUID()}`),
                    {
                      type: "employee",
                      source: "csv_upload",
                      uploadFileName: file.name,
                      ...payload,
                      updatedAt: fns.serverTimestamp(),
                    },
                    { merge: true }
                  )
                )
              );
            }
            await addLog("employee_bulk_upload", `${valid.length}명 업로드${invalid ? ` / ${invalid}행 제외` : ""}`);
            setToast({
              type: "success",
              message: `${valid.length}명 업로드 완료${invalid ? `, ${invalid}행 제외` : ""}`,
            });
          } catch (error) {
            console.error(error);
            setToast({ type: "error", message: "업로드 실패: 양식 또는 네트워크 상태를 확인하세요." });
          } finally {
            event.target.value = "";
          }
        };

        const deleteEmployeeRecord = async (employee, { fns, db }) => {
          if (employee.source === "hr_manager" && employee.sourceDocId) {
            const key = sourceExclusionKey(employee.source, employee.sourceDocId);
            sourceExclusionsRef.current = new Set([...sourceExclusionsRef.current, key]);
            await fns.setDoc(
              fns.doc(db, SHARED_COLLECTION, sourceExclusionDocId(employee.source, employee.sourceDocId)),
              {
                type: SOURCE_EXCLUSION_TYPE,
                source: employee.source,
                sourcePath: employee.sourcePath || HR_MANAGER_SOURCE_PATH,
                sourceDocId: employee.sourceDocId,
                employeeDocId: employee.id,
                employeeName: employee.name || "",
                createdAt: fns.serverTimestamp(),
                updatedAt: fns.serverTimestamp(),
              },
              { merge: true }
            );
          }
          await fns.deleteDoc(fns.doc(db, SHARED_COLLECTION, employee.id));
        };

        const deleteEmployee = async () => {
          const targets = deleteTarget?.bulk ? deleteTarget.employees || [] : deleteTarget ? [deleteTarget] : [];
          if (!targets.length) return;
          try {
            const { fns, db } = services;
            for (let i = 0; i < targets.length; i += 25) {
              const chunk = targets.slice(i, i + 25);
              await Promise.all(chunk.map((employee) => deleteEmployeeRecord(employee, { fns, db })));
            }
            const deletedIds = new Set(targets.map((employee) => employee.id));
            setSelectedEmployeeIds((prev) => prev.filter((id) => !deletedIds.has(id)));
            await addLog(
              deleteTarget?.bulk ? "employee_bulk_delete" : "employee_delete",
              deleteTarget?.bulk ? `${targets.length}명 삭제` : `${targets[0].name}/${targets[0].department}`
            );
            setToast({
              type: "success",
              message: deleteTarget?.bulk ? `${targets.length}명 삭제 완료` : "직원 정보가 삭제되었습니다.",
            });
          } catch (error) {
            console.error(error);
            setToast({ type: "error", message: "삭제에 실패했습니다." });
          } finally {
            setDeleteTarget(null);
          }
        };

        const saveScenario = async (next) => {
          setScenario(next);
          await saveDoc("scenario_main", { type: "scenario", ...next }, "시뮬레이션 값이 저장되었습니다.");
          await addLog("scenario_update", "시나리오 파라미터 변경");
        };

        const saveForecast = async (next) => {
          setForecastInput(next);
          await saveDoc("forecast_main", { type: "forecast", ...next }, "3년 Forecast 값이 저장되었습니다.");
          await addLog("forecast_update", "Forecast 파라미터 변경");
        };

        const saveProductivity = async (next) => {
          setProductivity(next);
          await saveDoc("productivity_main", { type: "productivity", ...next }, "생산성 분석 값이 저장되었습니다.");
          await addLog("productivity_update", "생산성 파라미터 변경");
        };

        const saveSettings = async (next) => {
          setSettings(next);
          await saveDoc("settings_main", { type: "settings", ...next }, "기준값이 저장되었습니다.");
          await addLog("settings_update", "기준 매출/경고치 변경");
        };

        const activeMeta = VIEW_META[activeSection] || VIEW_META.overview;
        const deleteConfirmEmployees = deleteTarget?.bulk ? deleteTarget.employees || [] : deleteTarget ? [deleteTarget] : [];
        const deleteConfirmTitle = deleteTarget?.bulk
          ? `선택한 직원 ${formatNumber(deleteConfirmEmployees.length)}명을 삭제할까요?`
          : "직원 정보를 삭제할까요?";
        const deleteConfirmMessage = deleteTarget?.bulk
          ? `${deleteConfirmEmployees.slice(0, 5).map((employee) => employee.name || "이름 없음").join(", ")}${
              deleteConfirmEmployees.length > 5 ? ` 외 ${formatNumber(deleteConfirmEmployees.length - 5)}명` : ""
            }`
          : deleteTarget
            ? `${deleteTarget.name} / ${deleteTarget.department}`
            : "";

        if (!firebaseReady || loading) {
          return <Spinner label="Firebase 연결 및 데이터 동기화 중..." />;
        }

        return (
          <div className="app-layout">
            <Toast toast={toast} onClose={() => setToast(null)} />
            <ConfirmModal
              open={!!deleteTarget}
              title={deleteConfirmTitle}
              message={deleteConfirmMessage}
              onCancel={() => setDeleteTarget(null)}
              onConfirm={deleteEmployee}
            />

            {employeeModal.open && (
              <EmployeeEditor
                data={employeeModal.target}
                onClose={() => setEmployeeModal({ open: false, mode: "create", target: null })}
                onSave={upsertEmployee}
              />
            )}

            <aside className="sidebar no-print">
              <div className="sidebar-brand flex items-center gap-3">
                <div className="brand-mark">
                  <i className="fa-solid fa-chart-simple"></i>
                </div>
                <div>
                  <div className="brand-title">인건비 전략센터</div>
                  <div className="brand-subtitle">Enterprise Workforce Cost</div>
                </div>
              </div>
              <nav className="nav-list" aria-label="대시보드 메뉴">
                {NAV_ITEMS.map((item) => (
                  <button
                    key={item.id}
                    type="button"
                    className={`nav-link text-left ${activeSection === item.id ? "active" : ""}`}
                    onClick={() => setActiveSection(item.id)}
                  >
                    <i className={item.icon}></i>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>
              <div className="side-summary">
                <div className="side-summary-row">
                  <span>총 인건비</span>
                  <b className="metric-number">{formatCurrencyShort(totalLaborCost)}</b>
                </div>
                <div className="side-summary-row">
                  <span>인건비율</span>
                  <b className={laborRatio > safeNumber(settings.warningLaborRatio) ? "metric-number text-red-500" : "metric-number"}>
                    {formatPercent(laborRatio)}
                  </b>
                </div>
                <div className="side-summary-row">
                  <span>예상 증감</span>
                  <b className={scenarioResult.deltaRate > 0 ? "metric-number text-amber-500" : "metric-number"}>
                    {formatPercent(scenarioResult.deltaRate)}
                  </b>
                </div>
              </div>
            </aside>

            <main className="app-main space-y-5">
            <header className="panel app-header p-4 md:p-5 fade-in">
              <div className="flex flex-wrap items-center justify-between gap-3">
                <div>
                  <div className="text-xs font-bold primary mb-1">{activeMeta.kicker}</div>
                  <h1 className="text-2xl md:text-3xl font-extrabold">{activeMeta.title}</h1>
                  <p className="page-copy">{activeMeta.copy}</p>
                  <div className="header-meta">
                    <span className="status-pill"><span className="status-dot"></span>실시간 동기화</span>
                    <span className="status-pill">총 {formatNumber(totalPeople)}명</span>
                    <span className="status-pill">변경 {formatNumber(logs.length)}건</span>
                  </div>
                </div>
                <div className="flex items-center gap-2 no-print">
                  <button
                    className="btn-secondary px-3 py-2 rounded-xl"
                    onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                  >
                    <i className={`fa-solid ${theme === "dark" ? "fa-sun" : "fa-moon"} mr-2`}></i>
                    {theme === "dark" ? "라이트 모드" : "다크 모드"}
                  </button>
                  <button className="btn-secondary px-3 py-2 rounded-xl" onClick={() => window.print()}>
                    <i className="fa-solid fa-print mr-2"></i>A4 인쇄
                  </button>
                </div>
              </div>
            </header>

            {activeSection === "overview" && (
              <div id="overview" className="view-shell fade-in">
                <section className="summary-strip print-break">
                  <KPI icon="fa-solid fa-users" label="총 인원" value={`${formatNumber(totalPeople)}명`} />
                  <KPI icon="fa-solid fa-coins" label="총 인건비" value={formatCurrencyManwon(totalLaborCost)} />
                  <KPI icon="fa-solid fa-chart-pie" label="인건비율" value={formatPercent(laborRatio)} tone={laborRatio > safeNumber(settings.warningLaborRatio) ? "danger" : "normal"} />
                  <KPI icon="fa-solid fa-arrow-trend-up" label="올해 예상 증가율" value={formatPercent(scenarioResult.deltaRate)} tone={scenarioResult.deltaRate > 0 ? "warn" : "normal"} />
                </section>
                <section className="content-grid two">
                  <div className="panel p-4 md:p-5">
                    <div className="section-head">
                      <h2 className="section-title tone-core">경영 판단 보드</h2>
                      <span className="badge-soft">실시간 기준</span>
                    </div>
                    <div className="risk-list">
                      {riskAlerts.map((r, idx) => (
                        <div key={idx} className="risk-item">
                          <span className={`risk-icon ${r.level === "danger" ? "text-red-500" : r.level === "warn" ? "text-amber-500" : "primary"}`}>
                            <i className={r.level === "ok" ? "fa-solid fa-check" : "fa-solid fa-exclamation"}></i>
                          </span>
                          <div>
                            <div className="font-bold">{r.level === "danger" ? "즉시 관리 필요" : r.level === "warn" ? "주의 관찰" : "정상 범위"}</div>
                            <div className="subtext text-sm mt-1">{r.text}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="score-row mt-4">
                      <span>핵심 변화 동인</span>
                      <b>{autoCauseSummary}</b>
                    </div>
                  </div>
                  <div className="panel p-4 md:p-5">
                    <h2 className="section-title tone-analytics mb-3">비용 집중도 Snapshot</h2>
                    <div className="space-y-1">
                      {departmentTop5.map((d, idx) => (
                        <div key={d.department} className="score-row">
                          <span>{idx + 1}. {d.department}</span>
                          <b className="metric-number">{formatCurrencyShort(d.cost)}</b>
                        </div>
                      ))}
                      {!departmentTop5.length && <div className="empty-state">부서별 데이터가 없습니다.</div>}
                    </div>
                  </div>
                </section>
                <section className="content-grid equal">
                  <div className="panel p-4 md:p-5">
                    <h2 className="section-title tone-sim mb-3">시나리오 영향</h2>
                    <div className="score-row"><span>시나리오 총 인건비</span><b className="metric-number">{formatCurrency(scenarioResult.total)}</b></div>
                    <div className="score-row"><span>EBITDA 영향</span><b className="metric-number">{formatCurrency(scenarioResult.ebitdaImpact)}</b></div>
                    <div className="score-row"><span>경고 기준 대비</span><b className="metric-number">{formatPercent(scenarioResult.ratio - safeNumber(settings.warningLaborRatio))}</b></div>
                  </div>
                  <div className="panel p-4 md:p-5">
                    <h2 className="section-title tone-productivity mb-3">인력 적정성</h2>
                    <div className="score-row"><span>현재 인원</span><b className="metric-number">{formatNumber(totalPeople)}명</b></div>
                    <div className="score-row"><span>생산성 기준 적정 인원</span><b className="metric-number">{formatNumber(productivityResult.required)}명</b></div>
                    <div className="score-row"><span>과잉/부족 인원</span><b className="metric-number">{formatNumber(productivityResult.gap)}명</b></div>
                  </div>
                </section>
              </div>
            )}

            {activeSection === "people" && (
              <div id="people" className="view-shell fade-in">
                <section className="summary-strip">
                  <div className="summary-item"><div className="summary-label">관리 대상</div><div className="summary-value metric-number">{formatNumber(totalPeople)}명</div><div className="summary-note">전체 직원 기준</div></div>
                  <div className="summary-item"><div className="summary-label">필터 결과</div><div className="summary-value metric-number">{formatNumber(filteredEmployees.length)}명</div><div className="summary-note">현재 조회 조건</div></div>
                  <div className="summary-item"><div className="summary-label">부서 수</div><div className="summary-value metric-number">{formatNumber(departmentOptions.length)}개</div><div className="summary-note">미지정 포함</div></div>
                  <div className="summary-item"><div className="summary-label">평균 인건비</div><div className="summary-value metric-number">{formatCurrencyShort(avgCostPerPerson)}</div><div className="summary-note">1인당 연간</div></div>
                </section>
                <section className="panel p-4 md:p-5">
                  <div className="section-head">
                    <h2 className="section-title tone-core">직원 인건비 마스터</h2>
                    <div className="flex flex-wrap gap-2 no-print">
                      <button className="btn-secondary px-3 py-2 rounded-xl text-sm" onClick={downloadEmployeeTemplate}>
                        <i className="fa-solid fa-download mr-2"></i>양식 다운로드
                      </button>
                      <button className="btn-secondary px-3 py-2 rounded-xl text-sm" onClick={() => employeeUploadInputRef.current?.click()}>
                        <i className="fa-solid fa-upload mr-2"></i>양식 업로드
                      </button>
                      <button className="btn-primary px-4 py-2 rounded-xl text-sm" onClick={() => setEmployeeModal({ open: true, mode: "create", target: null })}>
                        <i className="fa-solid fa-plus mr-2"></i>직원 추가
                      </button>
                      <input
                        ref={employeeUploadInputRef}
                        type="file"
                        accept=".csv,text/csv"
                        className="hidden"
                        onChange={uploadEmployeeTemplate}
                      />
                    </div>
                  </div>
                  <div className="panel-muted rounded-lg p-3 text-sm mb-3 no-print">
                    양식은 CSV 파일입니다. 월급제는 이름과 월기본급, 시급제는 이름과 시급이 필수입니다.
                    시급제의 월소정근로시간은 비워두면 209시간으로 계산되며, 나머지 금액 항목은 비워두면 0으로 처리됩니다.
                  </div>
                  <div className="flex flex-wrap items-center gap-2 mb-3 no-print">
                    <span className="badge-soft">선택 {formatNumber(selectedEmployeeIds.length)}명</span>
                    <button

        const setField = (k, v) => setForm((prev) => ({ ...prev, [k]: v }));
        return (
          <div className="fixed inset-0 z-40 bg-black/40 flex items-center justify-center p-4">
            <div className="panel rounded-2xl p-5 w-full max-w-3xl shadow-2xl">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-lg">{data ? "직원 정보 수정" : "직원 정보 추가"}</h3>
                <button className="btn-secondary px-3 py-1.5 rounded-lg" onClick={onClose}>
                  닫기
                </button>
              </div>
              <div className="grid md:grid-cols-2 gap-3">
                <TextInput label="이름" value={form.name || ""} onChange={(v) => setField("name", v)} />
                <TextInput label="부서" value={form.department} onChange={(v) => setField("department", v)} />
                <TextInput label="직급" value={form.grade} onChange={(v) => setField("grade", v)} />
                <SelectInput
                  label="고용형태"
                  value={form.employmentType}
                  onChange={(v) => setField("employmentType", v)}
                  options={["정규직", "계약직", "파견"]}
                />
                <SelectInput
                  label="급여유형"
                  value={normalizeWageType(form.wageType, form.hourlyWage)}
                  onChange={(v) => setForm((prev) => ({ ...prev, wageType: v, monthlyHours: v === "시급제" ? safeNumber(prev.monthlyHours) || 209 : prev.monthlyHours }))}
                  options={["월급제", "시급제"]}
                />
                {normalizeWageType(form.wageType, form.hourlyWage) === "시급제" ? (
                  <>
                    <NumberInput label="시급" value={form.hourlyWage} onChange={(v) => setField("hourlyWage", v)} />
                    <NumberInput label="월 소정근로시간" value={form.monthlyHours || 209} onChange={(v) => setField("monthlyHours", v)} />
                  </>
                ) : (
                  <NumberInput label="월 기본급" value={form.baseSalary} onChange={(v) => setField("baseSalary", v)} />
                )}
                <NumberInput label="고정수당" value={form.fixedAllowance} onChange={(v) => setField("fixedAllowance", v)} />
                <NumberInput label="상여금" value={form.bonus} onChange={(v) => setField("bonus", v)} />
                <NumberInput label="성과급" value={form.performancePay} onChange={(v) => setField("performancePay", v)} />
                <NumberInput label="4대보험 사용자 부담액" value={form.insuranceEmployer} onChange={(v) => setField("insuranceEmployer", v)} />
                <NumberInput label="퇴직충당금" value={form.retirementProvision} onChange={(v) => setField("retirementProvision", v)} />
              </div>
              <div className="panel-muted rounded-lg p-3 mt-3 text-sm">
                총연봉(자동계산): <b>{formatCurrencyManwon(calcEmployeeTotal(form))}</b>
                <span className="subtext ml-2">
                  {normalizeWageType(form.wageType, form.hourlyWage) === "시급제"
                    ? `시급 × ${formatNumber(form.monthlyHours || 209)}시간 × 12개월 기준`
                    : "월 기본급 × 12개월 기준"}
                </span>
              </div>
              <div className="flex justify-end gap-2 mt-4">
                <button className="btn-secondary px-4 py-2 rounded-xl" onClick={onClose}>
                  취소
                </button>
                <button
                  className="btn-primary px-4 py-2 rounded-xl"
                  onClick={() => {
                    const wageType = normalizeWageType(form.wageType, form.hourlyWage);
                    if (!form.name) {
                      alert("이름을 입력하세요.");
                      return;
                    }
                    if (wageType === "시급제" && safeNumber(form.hourlyWage) <= 0) {
                      alert("시급을 입력하세요.");
                      return;
                    }
                    if (wageType === "월급제" && safeNumber(form.baseSalary) <= 0) {
                      alert("월 기본급을 입력하세요.");
                      return;
                    }
                    onSave(form, data?.id);
                  }}
                >
                  저장
                </button>
              </div>
            </div>
          </div>
        );
      }

      function TextInput({ label, value, onChange }) {
        return (
          <label className="block">
            <div className="text-xs subtext mb-1">{label}</div>
            <input
              type="text"
              className="form-control"
              value={value}
              onChange={(e) => onChange(e.target.value)}
            />
          </label>
        );
      }

      function SelectInput({ label, value, onChange, options }) {
        return (
          <label className="block">
            <div className="text-xs subtext mb-1">{label}</div>
            <select
              className="form-control"
              value={value}
              onChange={(e) => onChange(e.target.value)}
            >
              {options.map((o) => (
                <option key={o} value={o}>
                  {o}
                </option>
              ))}
            </select>
          </label>
        );
      }

      async function ensureDefaultDocs({ fns, db, hasSettings, hasScenario, hasForecast, hasProductivity }) {
        const jobs = [];
        if (!hasSettings) {
          jobs.push(
            fns.setDoc(
              fns.doc(db, SHARED_COLLECTION, "settings_main"),
              { type: "settings", ...DEFAULT_SETTINGS, createdAt: fns.serverTimestamp() },
              { merge: true }
            )
          );
        }
        if (!hasScenario) {
          jobs.push(
            fns.setDoc(
              fns.doc(db, SHARED_COLLECTION, "scenario_main"),
              { type: "scenario", ...DEFAULT_SCENARIO, createdAt: fns.serverTimestamp() },
              { merge: true }
            )
          );
        }
        if (!hasForecast) {
          jobs.push(
            fns.setDoc(
              fns.doc(db, SHARED_COLLECTION, "forecast_main"),
              { type: "forecast", ...DEFAULT_FORECAST, createdAt: fns.serverTimestamp() },
              { merge: true }
            )
          );
        }
        if (!hasProductivity) {
          jobs.push(
            fns.setDoc(
              fns.doc(db, SHARED_COLLECTION, "productivity_main"),
              { type: "productivity", ...DEFAULT_PRODUCTIVITY, createdAt: fns.serverTimestamp() },
              { merge: true }
            )
          );
        }
        await Promise.all(jobs);
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <ErrorBoundary>
          <App />
        </ErrorBoundary>
      );
    </script>
  </body>
</html>
